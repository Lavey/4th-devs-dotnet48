<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Dashboard — 05_02_ui</title>
<style>
  :root {
    --bg: #0b0b0f;
    --bg-surface: #141419;
    --bg-surface-2: #1c1c24;
    --bg-surface-3: #24242f;
    --border: #2a2a38;
    --text: #e8e8ed;
    --text-dim: #8888a0;
    --text-dimmer: #55556a;
    --accent: #7c6ef0;
    --accent-dim: #5a4ec0;
    --accent-glow: rgba(124,110,240,.15);
    --green: #4ade80;
    --red: #f87171;
    --orange: #fb923c;
    --blue: #60a5fa;
    --radius: 8px;
    --radius-lg: 12px;
    --font: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
    --mono: 'SF Mono',SFMono-Regular,ui-monospace,'DejaVu Sans Mono',Menlo,Consolas,monospace;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.6}
  body{display:flex;flex-direction:column;overflow:hidden}

  /* ---- Header ---- */
  .header{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg-surface);flex-shrink:0}
  .header h1{font-size:16px;font-weight:600;color:var(--accent);flex-shrink:0}
  .header .spacer{flex:1}
  .header label{font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:6px}
  .header select,.header button{background:var(--bg-surface-2);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:4px 10px;font-size:12px;cursor:pointer}
  .header select:hover,.header button:hover{border-color:var(--accent)}
  .header button.accent{background:var(--accent);color:#fff;border-color:var(--accent)}
  .header button.accent:hover{background:var(--accent-dim)}
  .header .status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
  .header .status-dot.streaming{background:var(--orange);animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* ---- Messages ---- */
  .messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
  .messages::-webkit-scrollbar{width:6px}
  .messages::-webkit-scrollbar-track{background:transparent}
  .messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  .msg{max-width:85%;display:flex;flex-direction:column;gap:6px}
  .msg.user{align-self:flex-end}
  .msg.assistant{align-self:flex-start}

  .msg-bubble{padding:10px 14px;border-radius:var(--radius-lg);font-size:14px;line-height:1.6;word-wrap:break-word}
  .msg.user .msg-bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
  .msg.assistant .msg-bubble{background:var(--bg-surface);border:1px solid var(--border);border-bottom-left-radius:4px}

  .msg-meta{font-size:11px;color:var(--text-dimmer);padding:0 4px}
  .msg.user .msg-meta{text-align:right}

  /* ---- Event blocks ---- */
  .event-block{margin:4px 0;padding:8px 12px;border-radius:var(--radius);font-size:13px}
  .event-block.thinking{background:var(--bg-surface-2);border-left:3px solid var(--accent);color:var(--text-dim);font-style:italic}
  .event-block.tool-call{background:var(--bg-surface-2);border-left:3px solid var(--blue)}
  .event-block.tool-result{background:var(--bg-surface-2);border-left:3px solid var(--green)}
  .event-block.tool-result.error{border-left-color:var(--red)}
  .event-block.artifact{background:var(--accent-glow);border:1px solid var(--accent-dim);border-radius:var(--radius-lg);padding:12px 16px}
  .event-block.error{background:rgba(248,113,113,.1);border-left:3px solid var(--red);color:var(--red)}
  .event-block .label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;color:var(--text-dim)}
  .event-block .tool-name{color:var(--blue);font-weight:600;font-family:var(--mono)}
  .event-block .tool-args{font-family:var(--mono);font-size:12px;color:var(--text-dim);margin-top:4px;white-space:pre-wrap;word-break:break-all}
  .event-block .tool-output{font-family:var(--mono);font-size:12px;color:var(--text-dim);margin-top:4px;max-height:200px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
  .event-block.artifact .art-title{font-weight:600;font-size:14px;color:var(--accent)}
  .event-block.artifact .art-desc{color:var(--text-dim);font-size:12px;margin-top:2px}
  .event-block.artifact .art-preview{margin-top:8px;background:var(--bg-surface);padding:10px;border-radius:var(--radius);font-family:var(--mono);font-size:12px;white-space:pre-wrap;max-height:200px;overflow-y:auto}

  /* ---- Text rendering ---- */
  .msg-text{white-space:pre-wrap;word-wrap:break-word}
  .msg-text code{background:var(--bg-surface-2);padding:1px 5px;border-radius:3px;font-family:var(--mono);font-size:13px}
  .msg-text strong{font-weight:600}
  .msg-text table{border-collapse:collapse;margin:8px 0;font-size:13px}
  .msg-text th,.msg-text td{border:1px solid var(--border);padding:4px 8px}
  .msg-text th{background:var(--bg-surface-2);font-weight:600}

  /* ---- Composer ---- */
  .composer{display:flex;gap:10px;padding:16px 20px;border-top:1px solid var(--border);background:var(--bg-surface);flex-shrink:0}
  .composer textarea{flex:1;background:var(--bg-surface-2);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px 14px;font-size:14px;font-family:var(--font);resize:none;outline:none;min-height:44px;max-height:120px;line-height:1.5}
  .composer textarea:focus{border-color:var(--accent)}
  .composer textarea::placeholder{color:var(--text-dimmer)}
  .composer button{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-lg);padding:0 20px;font-size:14px;font-weight:600;cursor:pointer;flex-shrink:0;transition:background .15s}
  .composer button:hover{background:var(--accent-dim)}
  .composer button:disabled{opacity:.4;cursor:not-allowed}

  /* ---- Empty state ---- */
  .empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-dimmer);gap:8px}
  .empty-state .icon{font-size:48px;opacity:.3}
  .empty-state p{font-size:14px}

  /* ---- Toggle switch ---- */
  .toggle{position:relative;display:inline-block;width:36px;height:20px}
  .toggle input{opacity:0;width:0;height:0}
  .toggle .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--bg-surface-3);border-radius:20px;transition:.2s}
  .toggle .slider::before{content:'';position:absolute;height:14px;width:14px;left:3px;bottom:3px;background:var(--text-dim);border-radius:50%;transition:.2s}
  .toggle input:checked+.slider{background:var(--accent)}
  .toggle input:checked+.slider::before{transform:translateX(16px);background:#fff}
</style>
</head>
<body>

<div class="header">
  <h1>&#x1F4AC; Chat Dashboard</h1>
  <div class="status-dot" id="statusDot" title="Idle"></div>
  <div class="spacer"></div>
  <label>
    Mode
    <select id="modeSelect">
      <option value="mock" selected>Mock</option>
      <option value="live">Live</option>
    </select>
  </label>
  <label>
    History
    <select id="historySelect">
      <option value="0">0</option>
      <option value="4">4</option>
      <option value="8" selected>8</option>
      <option value="480">480</option>
    </select>
  </label>
  <label>
    Typewriter
    <span class="toggle">
      <input type="checkbox" id="typewriterToggle" checked>
      <span class="slider"></span>
    </span>
  </label>
  <button class="accent" id="restartBtn" title="Reset conversation">&#x21BB; Restart</button>
</div>

<div class="messages" id="messages">
  <div class="empty-state" id="emptyState">
    <div class="icon">&#x1F916;</div>
    <p>Start a conversation</p>
  </div>
</div>

<div class="composer">
  <textarea id="input" placeholder="Type a message..." rows="1"></textarea>
  <button id="sendBtn">Send</button>
</div>

<script>
(function() {
  'use strict';

  // ---- DOM refs ----
  var messagesEl = document.getElementById('messages');
  var emptyState = document.getElementById('emptyState');
  var inputEl = document.getElementById('input');
  var sendBtn = document.getElementById('sendBtn');
  var modeSelect = document.getElementById('modeSelect');
  var historySelect = document.getElementById('historySelect');
  var restartBtn = document.getElementById('restartBtn');
  var statusDot = document.getElementById('statusDot');
  var typewriterToggle = document.getElementById('typewriterToggle');

  var streaming = false;
  var conversation = null;
  var autoScroll = true;

  // ---- Init ----
  loadConversation();

  // ---- Event listeners ----
  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  inputEl.addEventListener('input', autoResize);
  modeSelect.addEventListener('change', loadConversation);
  historySelect.addEventListener('change', loadConversation);
  restartBtn.addEventListener('click', resetConversation);
  messagesEl.addEventListener('scroll', function() {
    var el = messagesEl;
    autoScroll = (el.scrollHeight - el.scrollTop - el.clientHeight) < 50;
  });

  // ---- API ----
  function loadConversation() {
    var mode = modeSelect.value;
    var history = historySelect.value;
    fetch('/api/conversation?mode=' + mode + '&history=' + history)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        conversation = data;
        renderAll();
      })
      .catch(function(err) { console.error('Load error:', err); });
  }

  function resetConversation() {
    var mode = modeSelect.value;
    fetch('/api/reset', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode: mode })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      conversation = data;
      renderAll();
    })
    .catch(function(err) { console.error('Reset error:', err); });
  }

  function sendMessage() {
    var text = inputEl.value.trim();
    if (!text || streaming) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';

    // Add user message to UI immediately
    addMessageToUI({ id: 'tmp_' + Date.now(), role: 'user', status: 'complete', text: text });

    // Create assistant placeholder
    var assistantId = 'tmp_a_' + Date.now();
    var assistantMsg = { id: assistantId, role: 'assistant', status: 'streaming', events: [] };
    addMessageToUI(assistantMsg);

    setStreaming(true);

    var mode = modeSelect.value;
    var eventSource = null;

    fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: text, mode: mode })
    }).then(function(response) {
      if (!response.ok) {
        throw new Error('HTTP ' + response.status);
      }

      var reader = response.body.getReader();
      var decoder = new TextDecoder();
      var buffer = '';

      function read() {
        reader.read().then(function(result) {
          if (result.done) {
            setStreaming(false);
            return;
          }

          buffer += decoder.decode(result.value, { stream: true });
          var lines = buffer.split('\n');
          buffer = lines.pop(); // keep incomplete line

          for (var i = 0; i < lines.length; i++) {
            var line = lines[i].trim();
            if (line.indexOf('data: ') === 0) {
              var jsonStr = line.substring(6);
              try {
                var evt = JSON.parse(jsonStr);
                handleStreamEvent(assistantId, evt);
              } catch(e) { /* skip */ }
            }
          }

          read();
        }).catch(function(err) {
          console.error('Stream read error:', err);
          setStreaming(false);
        });
      }

      read();
    }).catch(function(err) {
      console.error('Chat error:', err);
      setStreaming(false);
    });
  }

  function handleStreamEvent(msgId, evt) {
    // Find the assistant message element
    var msgEl = document.getElementById('msg-' + msgId);
    if (!msgEl) return;

    var contentEl = msgEl.querySelector('.msg-content');
    if (!contentEl) return;

    var type = evt.type;
    var useTypewriter = typewriterToggle.checked;

    switch (type) {
      case 'assistant_message_start':
        // Already rendered
        break;

      case 'text_delta':
        appendTextDelta(contentEl, evt.textDelta, useTypewriter);
        break;

      case 'thinking_start':
        var thinkBlock = document.createElement('div');
        thinkBlock.className = 'event-block thinking';
        thinkBlock.id = 'think-' + evt.seq;
        thinkBlock.innerHTML = '<div class="label">' + escapeHtml(evt.label || 'Thinking...') + '</div><div class="think-text"></div>';
        contentEl.appendChild(thinkBlock);
        break;

      case 'thinking_delta':
        var thinkTexts = contentEl.querySelectorAll('.event-block.thinking .think-text');
        if (thinkTexts.length > 0) {
          var lastThink = thinkTexts[thinkTexts.length - 1];
          appendTextNode(lastThink, evt.textDelta, useTypewriter);
        }
        break;

      case 'thinking_end':
        // Mark thinking complete (no visual change needed)
        break;

      case 'tool_call':
        var tcBlock = document.createElement('div');
        tcBlock.className = 'event-block tool-call';
        tcBlock.id = 'tc-' + evt.toolCallId;
        var argsStr = evt.args ? JSON.stringify(evt.args, null, 2) : '{}';
        tcBlock.innerHTML = '<div class="label">Tool Call</div>' +
          '<div class="tool-name">' + escapeHtml(evt.name) + '</div>' +
          '<div class="tool-args">' + escapeHtml(argsStr) + '</div>';
        contentEl.appendChild(tcBlock);
        break;

      case 'tool_result':
        var trBlock = document.createElement('div');
        trBlock.className = 'event-block tool-result' + (evt.ok ? '' : ' error');
        trBlock.id = 'tr-' + evt.toolCallId;
        var outputStr = evt.output ? (typeof evt.output === 'string' ? evt.output : JSON.stringify(evt.output, null, 2)) : '';
        if (outputStr.length > 500) outputStr = outputStr.substring(0, 500) + '...';
        trBlock.innerHTML = '<div class="label">' + (evt.ok ? 'Result' : 'Error') + '</div>' +
          '<div class="tool-output">' + escapeHtml(outputStr) + '</div>';
        contentEl.appendChild(trBlock);
        break;

      case 'artifact':
        var artBlock = document.createElement('div');
        artBlock.className = 'event-block artifact';
        var previewStr = evt.preview || '';
        if (previewStr.length > 800) previewStr = previewStr.substring(0, 800) + '...';
        artBlock.innerHTML = '<div class="art-title">' + escapeHtml(evt.title || 'Artifact') + '</div>' +
          (evt.description ? '<div class="art-desc">' + escapeHtml(evt.description) + '</div>' : '') +
          '<div class="art-preview">' + escapeHtml(previewStr) + '</div>';
        contentEl.appendChild(artBlock);
        break;

      case 'error':
        var errBlock = document.createElement('div');
        errBlock.className = 'event-block error';
        errBlock.innerHTML = '<div class="label">Error</div>' + escapeHtml(evt.message || 'Unknown error');
        contentEl.appendChild(errBlock);
        break;

      case 'complete':
        // Mark complete
        msgEl.classList.remove('streaming');
        break;
    }

    scrollToBottom();
  }

  // ---- Rendering ----

  function renderAll() {
    messagesEl.innerHTML = '';
    if (!conversation || !conversation.messages || conversation.messages.length === 0) {
      messagesEl.appendChild(emptyState);
      emptyState.style.display = '';
      return;
    }

    emptyState.style.display = 'none';

    for (var i = 0; i < conversation.messages.length; i++) {
      addMessageToUI(conversation.messages[i]);
    }
    scrollToBottom();
  }

  function addMessageToUI(msg) {
    emptyState.style.display = 'none';

    var el = document.createElement('div');
    el.className = 'msg ' + msg.role;
    el.id = 'msg-' + msg.id;
    if (msg.status === 'streaming') el.classList.add('streaming');

    if (msg.role === 'user') {
      el.innerHTML = '<div class="msg-bubble"><div class="msg-text">' +
        renderMarkdown(msg.text || '') + '</div></div>';
    } else {
      el.innerHTML = '<div class="msg-bubble"><div class="msg-content"></div></div>';
      var contentEl = el.querySelector('.msg-content');

      if (msg.events && msg.events.length > 0) {
        renderEvents(contentEl, msg.events);
      }
    }

    messagesEl.appendChild(el);
    scrollToBottom();
    return el;
  }

  function renderEvents(container, events) {
    var textBuffer = '';

    for (var i = 0; i < events.length; i++) {
      var evt = events[i];

      switch (evt.type) {
        case 'text_delta':
          textBuffer += evt.textDelta || '';
          break;

        case 'thinking_start':
          flushText();
          var thinkBlock = document.createElement('div');
          thinkBlock.className = 'event-block thinking';
          thinkBlock.innerHTML = '<div class="label">' + escapeHtml(evt.label || 'Thinking...') + '</div><div class="think-text"></div>';
          container.appendChild(thinkBlock);
          // Collect thinking deltas
          var thinkText = '';
          while (i + 1 < events.length && events[i + 1].type === 'thinking_delta') {
            i++;
            thinkText += events[i].textDelta || '';
          }
          if (i + 1 < events.length && events[i + 1].type === 'thinking_end') {
            i++;
          }
          thinkBlock.querySelector('.think-text').textContent = thinkText;
          break;

        case 'tool_call':
          flushText();
          var tcBlock = document.createElement('div');
          tcBlock.className = 'event-block tool-call';
          var argsStr = evt.args ? JSON.stringify(evt.args, null, 2) : '{}';
          tcBlock.innerHTML = '<div class="label">Tool Call</div>' +
            '<div class="tool-name">' + escapeHtml(evt.name || '') + '</div>' +
            '<div class="tool-args">' + escapeHtml(argsStr) + '</div>';
          container.appendChild(tcBlock);
          break;

        case 'tool_result':
          var outputStr = evt.output ? (typeof evt.output === 'string' ? evt.output : JSON.stringify(evt.output, null, 2)) : '';
          if (outputStr.length > 500) outputStr = outputStr.substring(0, 500) + '...';
          var trBlock = document.createElement('div');
          trBlock.className = 'event-block tool-result' + (evt.ok ? '' : ' error');
          trBlock.innerHTML = '<div class="label">' + (evt.ok ? 'Result' : 'Error') + '</div>' +
            '<div class="tool-output">' + escapeHtml(outputStr) + '</div>';
          container.appendChild(trBlock);
          break;

        case 'artifact':
          flushText();
          var artBlock = document.createElement('div');
          artBlock.className = 'event-block artifact';
          var previewStr = evt.preview || '';
          if (previewStr.length > 800) previewStr = previewStr.substring(0, 800) + '...';
          artBlock.innerHTML = '<div class="art-title">' + escapeHtml(evt.title || 'Artifact') + '</div>' +
            (evt.description ? '<div class="art-desc">' + escapeHtml(evt.description) + '</div>' : '') +
            '<div class="art-preview">' + escapeHtml(previewStr) + '</div>';
          container.appendChild(artBlock);
          break;

        case 'error':
          flushText();
          var errBlock = document.createElement('div');
          errBlock.className = 'event-block error';
          errBlock.innerHTML = '<div class="label">Error</div>' + escapeHtml(evt.message || 'Unknown error');
          container.appendChild(errBlock);
          break;

        case 'complete':
          flushText();
          break;
      }
    }
    flushText();

    function flushText() {
      if (textBuffer) {
        var textEl = document.createElement('div');
        textEl.className = 'msg-text';
        textEl.innerHTML = renderMarkdown(textBuffer);
        container.appendChild(textEl);
        textBuffer = '';
      }
    }
  }

  // ---- Text streaming helpers ----

  function appendTextDelta(container, text, useTypewriter) {
    // Find or create the current text element
    var textEls = container.querySelectorAll('.msg-text');
    var textEl;
    if (textEls.length > 0) {
      textEl = textEls[textEls.length - 1];
      // Check if last child is a text element (not an event block)
      if (container.lastChild !== textEl) {
        textEl = document.createElement('div');
        textEl.className = 'msg-text';
        container.appendChild(textEl);
      }
    } else {
      textEl = document.createElement('div');
      textEl.className = 'msg-text';
      container.appendChild(textEl);
    }

    if (!textEl._rawText) textEl._rawText = '';
    textEl._rawText += text;
    textEl.innerHTML = renderMarkdown(textEl._rawText);
  }

  function appendTextNode(el, text, useTypewriter) {
    el.textContent += text;
  }

  // ---- Markdown-lite renderer ----
  function renderMarkdown(text) {
    if (!text) return '';
    var html = escapeHtml(text);
    // Bold
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Headers
    html = html.replace(/^### (.+)$/gm, '<strong style="font-size:14px;display:block;margin-top:8px">$1</strong>');
    html = html.replace(/^## (.+)$/gm, '<strong style="font-size:15px;display:block;margin-top:10px">$1</strong>');
    html = html.replace(/^# (.+)$/gm, '<strong style="font-size:16px;display:block;margin-top:12px">$1</strong>');
    // List items
    html = html.replace(/^- (.+)$/gm, '&nbsp;&nbsp;• $1');
    // Tables
    html = renderTables(html);
    // Line breaks
    html = html.replace(/\n/g, '<br>');
    return html;
  }

  function renderTables(html) {
    var lines = html.split('\n');
    var result = [];
    var inTable = false;
    var tableRows = [];

    for (var i = 0; i < lines.length; i++) {
      var line = lines[i].trim();
      if (line.indexOf('|') === 0 && line.lastIndexOf('|') === line.length - 1) {
        if (line.replace(/[\|\-\s]/g, '').length === 0) {
          // separator row, skip
          continue;
        }
        if (!inTable) {
          inTable = true;
          tableRows = [];
        }
        var cells = line.split('|').filter(function(c) { return c.trim() !== ''; });
        tableRows.push(cells.map(function(c) { return c.trim(); }));
      } else {
        if (inTable) {
          result.push(buildTable(tableRows));
          inTable = false;
          tableRows = [];
        }
        result.push(lines[i]);
      }
    }
    if (inTable) {
      result.push(buildTable(tableRows));
    }
    return result.join('\n');
  }

  function buildTable(rows) {
    if (rows.length === 0) return '';
    var html = '<table>';
    for (var r = 0; r < rows.length; r++) {
      html += '<tr>';
      var tag = r === 0 ? 'th' : 'td';
      for (var c = 0; c < rows[r].length; c++) {
        html += '<' + tag + '>' + rows[r][c] + '</' + tag + '>';
      }
      html += '</tr>';
    }
    html += '</table>';
    return html;
  }

  // ---- Helpers ----

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function setStreaming(val) {
    streaming = val;
    sendBtn.disabled = val;
    statusDot.className = 'status-dot' + (val ? ' streaming' : '');
    statusDot.title = val ? 'Streaming...' : 'Idle';
  }

  function scrollToBottom() {
    if (autoScroll) {
      requestAnimationFrame(function() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      });
    }
  }

  function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  }
})();
</script>
</body>
</html>
